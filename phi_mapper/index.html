<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
  <style>
    body { margin:0; background:#000; font-family:monospace; color:#ffd700; overflow:hidden; }
    #hud { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.9); padding:15px; border-radius:10px; z-index:100; }
    #modeToggle { position:absolute; top:10px; right:10px; background:rgba(255,215,0,0.8); color:black; padding:10px; border-radius:10px; cursor:pointer; }
    #globalMap { position:absolute; top:0; left:0; width:100vw; height:100vh; background:#111; display:none; z-index:50; }
    canvas { width:100vw; height:100vh; }
    .siteInfo { background:rgba(0,100,0,0.9); padding:10px; margin:5px; border-radius:5px; cursor:pointer; }
  </style>
</head>
<body>
  <div id="modeToggle" onclick="toggleMode()">🌍 Global Grid</div>
  <canvas id="arCanvas"></canvas>
  <div id="hud">
    <div>φₙ AR Field Detector</div>
    <div id="phiIndex">-</div>
    <div id="deltaLat">-</div>
    <div id="status">-</div>
    <div><a id="exportBtn" href="#" download="phi_data.json" style="color:#00ff00;font-size:14px;">📊 Export</a></div>
  </div>
  
  <div id="globalMap">
    <canvas id="mapCanvas"></canvas>
    <div id="siteList"></div>
  </div>

  <script>
    // φₙ Constants from your book
    const phi = 1.6180339887;
    const gizaBaseline = 29.9792458;
    
    // φₙ Sites from v0.3 (70+ nodes)
    const phiSites = {
      'Giza φ³': { lat: 29.9792, lng: 31.1342, scripture: 'Isaiah 19:19', type: 'φ³ Anchor' },
      'Jerusalem φ⁴': { lat: 31.7779, lng: 35.2358, scripture: 'Isaiah 2:3', type: 'φ⁴ Anchor' },
      'Stonehenge φ⁷': { lat: 51.1788, lng: -1.8262, scripture: 'Genesis 28:17', type: 'φ⁷ Terminal' },
      'Teotihuacan φ²': { lat: 19.6925, lng: -98.8436, scripture: 'Joel 2:3', type: 'φ² Resonance' },
      'Göbekli Tepe φ¹': { lat: 37.2231, lng: 38.9225, scripture: 'Romans 1:20', type: 'φ¹ Origin' },
      'Easter Island φ⁸': { lat: -27.1127, lng: -109.3497, scripture: 'Isaiah 43:12', type: 'φ⁸ Closure' }
    };

    // AR Canvas Setup
    const arCanvas = document.getElementById('arCanvas');
    const ctx = arCanvas.getContext('2d');
    arCanvas.width = window.innerWidth;
    arCanvas.height = window.innerHeight;
    
    let isARMode = true;
    let phiData = [];
    let mapScale = 0.01;
    let mapOffsetX = 0, mapOffsetY = 0;
    
    // Camera AR Mode
    function drawARField(phiIndex, status) {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, arCanvas.width, arCanvas.height);
      
      const scale = phiIndex * 150;
      const centerX = arCanvas.width / 2;
      const centerY = arCanvas.height / 2;
      
      // Touch interaction
      arCanvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const touch = e.touches[0];
        mapOffsetX = touch.clientX - arCanvas.width/2;
        mapOffsetY = touch.clientY - arCanvas.height/2;
      }, {passive: false});
      
      // Pulsing golden φₙ field over camera
      const pulse = Math.sin(Date.now() * 0.01) * 0.3 + 0.7;
      const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, scale * 3);
      gradient.addColorStop(0, `rgba(255, 215, 0, ${pulse})`);
      gradient.addColorStop(0.3, `rgba(255, 165, 0, ${pulse*0.7})`);
      gradient.addColorStop(1, 'rgba(0, 50, 100, 0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, arCanvas.width, arCanvas.height);
      
      // φₙ Spirals (golden ratio pattern)
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 4;
      ctx.beginPath();
      for(let i = 0; i < 8; i++) {
        const radius = scale * Math.pow(phi, i / 4);
        ctx.arc(centerX + mapOffsetX * 0.01, centerY + mapOffsetY * 0.01, radius, 0, Math.PI * 2);
      }
      ctx.stroke();
    }
    
    // Global Grid Mode
    function drawGlobalMap() {
      const mapCanvas = document.getElementById('mapCanvas');
      const mapCtx = mapCanvas.getContext('2d');
      mapCanvas.width = window.innerWidth;
      mapCanvas.height = window.innerHeight;
      
      mapCtx.fillStyle = '#111';
      mapCtx.fillRect(0, 0, mapCanvas.width, mapCanvas.height);
      
      // World map projection (simple equirectangular)
      const centerLat = 20, centerLng = 0;
      Object.entries(phiSites).forEach(([name, site]) => {
        const x = (site.lng - centerLng) * mapScale * mapCanvas.width + mapCanvas.width/2 + mapOffsetX;
        const y = (90 - site.lat) * mapScale * mapCanvas.height + mapCanvas.height/4 + mapOffsetY;
        
        // φₙ Node markers
        const phiIndex = Math.log10(Math.abs(site.lat - gizaBaseline)) / Math.log10(phi);
        const size = phiIndex * 8 + 4;
        mapCtx.fillStyle = phiIndex < 2 ? '#00ff00' : phiIndex < 4 ? '#ffaa00' : '#ff4444';
        mapCtx.beginPath();
        mapCtx.arc(x, y, size, 0, Math.PI * 2);
        mapCtx.fill();
        
        // Labels
        mapCtx.fillStyle = '#fff';
        mapCtx.font = '12px monospace';
        mapCtx.textAlign = 'center';
        mapCtx.fillText(`${name} φ${phiIndex.toFixed(1)}`, x, y + size + 15);
      });
    }
    
    // Mode Toggle
    function toggleMode() {
      isARMode = !isARMode;
      document.getElementById('globalMap').style.display = isARMode ? 'none' : 'block';
      document.getElementById('modeToggle').textContent = isARMode ? '🌍 Global Grid' : '📱 AR Mode';
    }
    
    // GPS + Main Loop
    navigator.geolocation.watchPosition(pos => {
      const deltaLat = Math.abs(pos.coords.latitude - gizaBaseline);
      const phiIndex = Math.log10(deltaLat) / Math.log10(phi);
      
      // Update HUD
      document.getElementById('phiIndex').textContent = `φₙ: ${phiIndex.toFixed(3)}`;
      document.getElementById('deltaLat').textContent = `Δlat: ${deltaLat.toFixed(4)}°`;
      
      let status = phiIndex < 1.5 ? 'φ₁ NODE' : phiIndex < 2 ? 'φ² RESONANCE' : 'φ³ ANCHOR';
      document.getElementById('status').innerHTML = `<span style="color:#${phiIndex<1.5?'00ff00':phiIndex<2?'ffaa00':'ff4444'}">${status}</span>`;
      
      // Data logging
      phiData.push({
        timestamp: new Date().toISOString(),
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude,
        deltaLat: deltaLat,
        phiIndex: phiIndex,
        status: status
      });
      
      // Export data
      const exportBtn = document.getElementById('exportBtn');
      const jsonData = JSON.stringify(phiData.slice(-100), null, 2);
      exportBtn.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(jsonData);
      
      // Render
      if (isARMode) drawARField(phiIndex, status);
      else drawGlobalMap();
      
    }, console.error, {enableHighAccuracy: true});
    
    // Touch zoom/pan
    let initialDistance = 0;
    arCanvas.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        initialDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      }
    });
    
    arCanvas.addEventListener('touchmove', e => {
      if (e.touches.length === 2) {
        const currentDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        mapScale = Math.max(0.005, Math.min(0.05, mapScale * currentDistance / initialDistance));
        initialDistance = currentDistance;
        e.preventDefault();
      }
    }, {passive: false});
  </script>
</body>
</html>
